name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 推送v开头的tag时触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        default: '1.0.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      
    - name: Install dependencies
      run: npm install
      
    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli
      
    - name: Build Tauri App
      run: tauri build
      
    - name: Package Release
      run: |
        mkdir -p release
        Copy-Item "src-tauri/target/release/ruhao-trading-app-tauri.exe" "release/如昊交易软件.exe" -ErrorAction SilentlyContinue
        Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse | Copy-Item -Destination "release/" -ErrorAction SilentlyContinue
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          release/*.exe
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 如昊交易软件-Windows
        path: release/
